# Prometheus configuration for FleetOps Maintenance Microservice
# SAD Reference: ADR-10 — Prometheus for metric collection

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fleetops-maintenance"
    static_configs:
      - targets: ["maintenance:8080"]
    metrics_path: "/metrics"
    scrape_interval: 10s
